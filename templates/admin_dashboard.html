<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: #eef2f7;
        }
        .sidebar {
            width: 240px;
            height: 100vh;
            background: #27518f;
            color: white;
            position: fixed;
            padding-top: 30px;
            box-shadow: 3px 0 10px rgba(0,0,0,0.1);
        }
        .sidebar h4 {
            font-weight: 600;
        }
        .sidebar a {
            color: white;
            display: block;
            padding: 12px 22px;
            text-decoration: none;
            font-size: 16px;
            transition: 0.2s;
        }
        .sidebar a:hover {
            background: rgba(255,255,255,0.18);
            padding-left: 28px;
        }
        .content {
            margin-left: 260px;
            padding: 40px;
        }
        .card {
            border-radius: 14px;
            border: none;
            background: #ffffff;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }
        table thead {
            background: #27518f;
            color: white;
        }
        table tbody tr:hover {
            background: #f1f5fb;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4 class="text-center mb-4">Admin Panel</h4>

    <a href="/admin/dashboard">Dashboard</a>
    <a href="/admin/users/add">Add User</a>
    <a href="/admin/logs">Attendance Logs</a>
    <a href="/logout">Logout</a>
</div>

<div class="content">
    <h2 class="fw-bold">Welcome, {{.Username}}</h2>
    <p class="text-muted">Manage users and attendance records</p>

    <div class="card p-4 mt-4">
        <h4 class="mb-3">Registered Users</h4>

        <table class="table table-bordered table-striped mt-3">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Password</th>
                    <th>Role</th>
                </tr>
            </thead>
            <tbody>
                {{range .Users}}
                <tr>
                    <td>{{.Username}}</td>
                    <td>{{.Password}}</td>
                    <td>{{.Role}}</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
