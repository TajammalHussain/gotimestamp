<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Attendance</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #eef2f7;
            font-family: "Segoe UI", sans-serif;
        }
        .card {
            margin-top: 60px;
            padding: 30px;
            border-radius: 14px;
            background: #ffffff;
            border: none;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }
        .btn-checkin {
            background: #28a745;
            color: white;
            font-size: 18px;
            padding: 12px;
            border-radius: 8px;
        }
        .btn-checkout {
            background: #dc3545;
            color: white;
            font-size: 18px;
            padding: 12px;
            border-radius: 8px;
        }
        #timer {
            font-size: 34px;
            font-weight: 700;
            color: #0d6efd;
            margin-top: 10px;
        }
        .logout-link {
            text-decoration: none;
            font-weight: 500;
        }
        .logout-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card text-center">
                <h3 class="mb-2">Welcome, {{.Username}}</h3>
                <p class="text-muted mb-4">Your attendance dashboard</p>

                <h5 class="mt-3">Shift Duration</h5>
                <div id="timer">00:00:00</div>

                <form action="/submit" method="POST" class="mt-4">

                    <input type="hidden" name="latitude" id="lat">
                    <input type="hidden" name="longitude" id="lon">

                    {{if .CheckedIn}}
                        <input type="hidden" name="status" value="Check-Out">
                        <button class="btn-checkout w-100 mt-3">Check-Out</button>
                    {{else}}
                        <input type="hidden" name="status" value="Check-In">
                        <button class="btn-checkin w-100 mt-3">Check-In</button>
                    {{end}}

                </form>

                <div class="mt-4">
                    <a href="/logout" class="logout-link">Logout</a>
                </div>

            </div>

        </div>
    </div>
</div>

<script>
// Auto GPS capture
navigator.geolocation.getCurrentPosition(function(pos) {
    document.getElementById("lat").value = pos.coords.latitude;
    document.getElementById("lon").value = pos.coords.longitude;
});

// Timer logic
let lastCheckIn = "{{.LastCheckIn}}";
let finalDuration = "{{.FinalDuration}}";

function formatTime(h, m, s) {
    return String(h).padStart(2, '0') + ":" +
           String(m).padStart(2, '0') + ":" +
           String(s).padStart(2, '0');
}

if (lastCheckIn === "" && finalDuration === "") {
    // Not checked in yet
    document.getElementById("timer").innerText = "00:00:00";

} else if (lastCheckIn !== "") {
    // Live timer
    let start = new Date(lastCheckIn);

    setInterval(function() {
        let now = new Date();
        let diff = Math.floor((now - start) / 1000);

        let h = Math.floor(diff / 3600);
        let m = Math.floor((diff % 3600) / 60);
        let s = diff % 60;

        document.getElementById("timer").innerText = formatTime(h, m, s);
    }, 1000);

} else if (finalDuration !== "") {
    // Freeze timer after checkout
    document.getElementById("timer").innerText = finalDuration;
}
</script>

</body>
</html>
