<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #eef2f7; font-family: "Segoe UI", sans-serif; }
        .card { margin-top: 60px; padding: 30px; border-radius: 14px; background: #ffffff; border: none; box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
        .btn-checkin  { background: #28a745; color: white; font-size: 18px; padding: 12px; border-radius: 8px; border: none; width: 100%; cursor: pointer; }
        .btn-checkout { background: #dc3545; color: white; font-size: 18px; padding: 12px; border-radius: 8px; border: none; width: 100%; cursor: pointer; }
        .btn-checkin:disabled, .btn-checkout:disabled { opacity: 0.6; cursor: not-allowed; }
        #timer { font-size: 34px; font-weight: 700; color: #0d6efd; margin-top: 10px; }
        #gps-status { font-size: 13px; margin-top: 8px; min-height: 20px; }
        .logout-link { text-decoration: none; font-weight: 500; }
        .logout-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card text-center">
                <h3 class="mb-2">Welcome, {{.Username}}</h3>
                <p class="text-muted mb-4">Your attendance dashboard</p>

                <h5 class="mt-3">Shift Duration</h5>
                <div id="timer">00:00:00</div>

                <!-- GPS status shown to user -->
                <div id="gps-status" class="text-muted">📍 Getting your location...</div>

                <form action="/submit" method="POST" class="mt-3" id="attendanceForm">
                    <input type="hidden" name="latitude"  id="lat">
                    <input type="hidden" name="longitude" id="lon">

                    {{if .CheckedIn}}
                        <input type="hidden" name="status" value="Check-Out">
                        <button class="btn-checkout mt-3" id="submitBtn" disabled>Check-Out</button>
                    {{else}}
                        <input type="hidden" name="status" value="Check-In">
                        <button class="btn-checkin mt-3" id="submitBtn" disabled>Check-In</button>
                    {{end}}
                </form>

                <div class="mt-4">
                    <a href="/logout" class="logout-link">Logout</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ── GPS: get location FIRST, then enable the button ──────────────────────────
const btn       = document.getElementById('submitBtn');
const gpsStatus = document.getElementById('gps-status');

function onGpsSuccess(pos) {
    document.getElementById('lat').value = pos.coords.latitude;
    document.getElementById('lon').value = pos.coords.longitude;
    gpsStatus.innerHTML = '✅ Location captured';
    gpsStatus.className = 'text-success';
    btn.disabled = false;
}

function onGpsError(err) {
    // Still allow submit even if GPS fails — location will be "Unknown"
    gpsStatus.innerHTML = '⚠️ Location unavailable — you can still proceed';
    gpsStatus.className = 'text-warning';
    btn.disabled = false;
}

if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(onGpsSuccess, onGpsError, {
        timeout: 10000,         // wait up to 10 seconds
        maximumAge: 0,          // always get fresh location
        enableHighAccuracy: true
    });
} else {
    gpsStatus.innerHTML = '⚠️ Geolocation not supported';
    gpsStatus.className = 'text-warning';
    btn.disabled = false;
}

// ── Timer ─────────────────────────────────────────────────────────────────────
const lastCheckIn   = "{{.LastCheckIn}}";
const finalDuration = "{{.FinalDuration}}";

function formatTime(h, m, s) {
    return String(h).padStart(2,'0') + ':' +
           String(m).padStart(2,'0') + ':' +
           String(s).padStart(2,'0');
}

if (lastCheckIn !== "") {
    // Live running timer
    const start = new Date(lastCheckIn);
    setInterval(function() {
        const diff = Math.floor((new Date() - start) / 1000);
        document.getElementById('timer').innerText = formatTime(
            Math.floor(diff / 3600),
            Math.floor((diff % 3600) / 60),
            diff % 60
        );
    }, 1000);
} else if (finalDuration !== "") {
    // Frozen after checkout
    document.getElementById('timer').innerText = finalDuration;
} else {
    document.getElementById('timer').innerText = '00:00:00';
}
</script>

</body>
</html>
