<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: "Segoe UI", sans-serif; background: #eef2f7; }
        .sidebar { width: 240px; height: 100vh; background: #27518f; color: white; position: fixed; padding-top: 30px; box-shadow: 3px 0 10px rgba(0,0,0,0.1); }
        .sidebar h4 { font-weight: 600; }
        .sidebar a { color: white; display: block; padding: 12px 22px; text-decoration: none; font-size: 15px; transition: 0.2s; }
        .sidebar a:hover { background: rgba(255,255,255,0.18); padding-left: 28px; }
        .role-badge { display: inline-block; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 2px 10px; font-size: 12px; }
        .content { margin-left: 260px; padding: 40px; }
        .card { border-radius: 14px; border: none; background: #fff; box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
        .error { color: #d9534f; font-weight: 500; }
    </style>
</head>
<body>
<div class="sidebar">
    <h4 class="text-center mb-1">GoTimeStamp</h4>
    <p class="text-center mb-4"><span class="role-badge">Admin</span></p>
    <a href="/admin/dashboard">🏠 Dashboard</a>
    <a href="/admin/users/add">➕ Add User</a>
    <a href="/admin/logs">📋 Attendance Logs</a>
    <hr style="border-color:rgba(255,255,255,0.2);margin:10px 20px;">
    <a href="/logout">🚪 Logout</a>
</div>
<div class="content">
    <h2 class="fw-bold">Add New User</h2>
    <p class="text-muted">Create a new account</p>
    <div class="card p-4 mt-4" style="max-width:480px;">
        {{if .Error}}<p class="error">⚠ {{.Error}}</p>{{end}}
        <form action="/admin/users/add" method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="text" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Role</label>
                <select name="role" class="form-select">
                    <option value="employee">👤 Employee</option>
                    <option value="admin">🔧 Admin</option>
                    {{if .IsSuperAdmin}}<option value="superadmin">⭐ Super Admin</option>{{end}}
                </select>
            </div>
            <button class="btn btn-primary w-100" style="padding:12px;font-size:16px;">Add User</button>
        </form>
    </div>
</div>
</body>
</html>
